spring.application.name=portfolio

# ==========================
# DATABASE (Railway / Render)
# ==========================
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ==========================
# SERVER
# ==========================
server.port=${PORT:8080}

# ==========================
# DATABASE SEEDING
# ==========================
app.seed.enabled=${SEED_DATABASE:true}

# ==========================
# CORS
# ==========================
app.cors.allowed-origin=${FRONTEND_URL:http://localhost:5173}

# ==========================
# MAIL
# ==========================
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

app.notify.email=${NOTIFY_EMAIL:}

# ==========================
# PROFILE
# ==========================
app.profile.name=${PROFILE_NAME:Spardha Shukla}
app.profile.title=${PROFILE_TITLE:Software Developer Engineer}
app.profile.email=${PROFILE_EMAIL:spardha964864shukla@gmail.com}
app.profile.phone=${PROFILE_PHONE:+91 8299827036}
app.profile.location=${PROFILE_LOCATION:Kanpur, Uttar Pradesh, India}

app.profile.summary=${PROFILE_SUMMARY:Ambitious and results-driven Software Engineer skilled in Java, Python, MERN Stack, AI, Cloud Computing and Data Structures & Algorithms. Passionate about building scalable full-stack applications and intelligent software solutions.}

app.profile.github=${PROFILE_GITHUB:https://github.com/Spardha-Stack}
app.profile.linkedin=${PROFILE_LINKEDIN:https://www.linkedin.com/in/spardha-shukla-1bb9a9279/}
app.profile.leetcode=${PROFILE_LEETCODE:https://leetcode.com/u/SPARDHA829982/}

# ==========================
# SWAGGER
# ==========================
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs