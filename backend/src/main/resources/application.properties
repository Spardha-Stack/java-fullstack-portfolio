spring.application.name=portfolio

# --- Database (MySQL) ---
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/portfolio_db}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# --- Seeding ---
app.seed.enabled=${SEED_DATABASE:true}

# --- Server ---
server.port=${PORT:8080}

# --- CORS (frontend origin, set via env in each environment) ---
app.cors.allowed-origin=${FRONTEND_URL:http://localhost:5173}

# --- Mail (contact form notifications) ---
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
app.notify.email=${NOTIFY_EMAIL:}

# --- Profile (overridable without touching Java code) ---
app.profile.name=${PROFILE_NAME:Spardha Shukla}
app.profile.title=${PROFILE_TITLE:Software Developer Engineer}
app.profile.email=${PROFILE_EMAIL:spardha964864shukla@gmail.com}
app.profile.phone=${PROFILE_PHONE:+91 82998 27036}
app.profile.location=${PROFILE_LOCATION:Kanpur, Uttar Pradesh, India}
app.profile.github=${PROFILE_GITHUB:}
app.profile.linkedin=${PROFILE_LINKEDIN:}
app.profile.leetcode=${PROFILE_LEETCODE:}

# --- Swagger / OpenAPI ---
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs
